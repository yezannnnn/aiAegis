<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ Aegis 实时监控 (WebSocket)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            margin: 0;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #16213e;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .connected { background: #10b981; }
        .disconnected { background: #ef4444; }
        .events-container {
            max-height: 600px;
            overflow-y: auto;
            background: #16213e;
            border-radius: 8px;
            padding: 20px;
        }
        .event {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid;
        }
        .event-blocked {
            background: rgba(239, 68, 68, 0.1);
            border-left-color: #ef4444;
        }
        .event-warning {
            background: rgba(245, 158, 11, 0.1);
            border-left-color: #f59e0b;
        }
        .event-allowed {
            background: rgba(16, 185, 129, 0.1);
            border-left-color: #10b981;
        }
        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .event-type {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
        }
        .event-time {
            font-size: 12px;
            opacity: 0.7;
        }
        .event-message {
            margin-bottom: 5px;
        }
        .event-command {
            font-family: 'Courier New', monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px;
            border-radius: 3px;
            font-size: 12px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛡️ Aegis 实时安全监控</h1>
        <p>WebSocket实时连接 - 零延迟事件推送</p>
    </div>

    <div class="status-bar">
        <div class="status-item">
            <div class="status-dot" id="connectionStatus"></div>
            <span id="connectionText">连接中...</span>
        </div>
        <div class="status-item">
            <span>事件总数: <strong id="totalEvents">0</strong></span>
        </div>
        <div class="status-item">
            <span id="lastUpdate">等待事件...</span>
        </div>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-number" id="blockedCount" style="color: #ef4444;">0</div>
            <div class="stat-label">已拦截</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="warningCount" style="color: #f59e0b;">0</div>
            <div class="stat-label">警告</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="allowedCount" style="color: #10b981;">0</div>
            <div class="stat-label">已允许</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="uptimeDisplay">00:00</div>
            <div class="stat-label">运行时间</div>
        </div>
    </div>

    <div class="events-container" id="eventsContainer">
        <div style="text-align: center; opacity: 0.5; margin: 50px 0;">
            📡 等待实时事件推送...
        </div>
    </div>

    <script>
        class AegisWebSocketMonitor {
            constructor() {
                this.ws = null;
                this.events = [];
                this.stats = { blocked: 0, warning: 0, allowed: 0 };
                this.startTime = Date.now();
                this.connectToBackend();
                this.startUptime();
            }

            connectToBackend() {
                console.log('🔗 连接到Aegis后端服务...');

                try {
                    this.ws = new WebSocket('ws://localhost:9877');

                    this.ws.onopen = () => {
                        console.log('✅ WebSocket连接成功');
                        this.updateConnectionStatus(true);
                    };

                    this.ws.onmessage = (event) => {
                        try {
                            const data = JSON.parse(event.data);
                            this.handleMessage(data);
                        } catch (error) {
                            console.error('📥 消息解析错误:', error);
                        }
                    };

                    this.ws.onclose = () => {
                        console.log('❌ WebSocket连接关闭');
                        this.updateConnectionStatus(false);
                        // 5秒后重连
                        setTimeout(() => this.connectToBackend(), 5000);
                    };

                    this.ws.onerror = (error) => {
                        console.error('🔥 WebSocket错误:', error);
                        this.updateConnectionStatus(false);
                    };

                } catch (error) {
                    console.error('🔥 WebSocket创建失败:', error);
                    this.updateConnectionStatus(false);
                    setTimeout(() => this.connectToBackend(), 5000);
                }
            }

            handleMessage(data) {
                switch (data.type) {
                    case 'init':
                        console.log(`📋 接收初始事件: ${data.events.length} 个`);
                        data.events.forEach(event => this.addEvent(event));
                        break;

                    case 'new_event':
                        console.log('📡 接收新事件:', data.event);
                        this.addEvent(data.event);
                        break;

                    default:
                        console.log('📥 未知消息类型:', data.type);
                }
            }

            addEvent(event) {
                this.events.unshift(event); // 新事件在前
                this.updateStats(event.type);
                this.renderEvents();
                this.updateLastActivity();
            }

            updateStats(eventType) {
                this.stats[eventType] = (this.stats[eventType] || 0) + 1;

                document.getElementById('blockedCount').textContent = this.stats.blocked || 0;
                document.getElementById('warningCount').textContent = this.stats.warning || 0;
                document.getElementById('allowedCount').textContent = this.stats.allowed || 0;
                document.getElementById('totalEvents').textContent = this.events.length;
            }

            updateConnectionStatus(connected) {
                const statusDot = document.getElementById('connectionStatus');
                const statusText = document.getElementById('connectionText');

                if (connected) {
                    statusDot.className = 'status-dot connected';
                    statusText.textContent = '✅ 已连接';
                } else {
                    statusDot.className = 'status-dot disconnected';
                    statusText.textContent = '❌ 已断开 (5秒后重连)';
                }
            }

            updateLastActivity() {
                const now = new Date();
                document.getElementById('lastUpdate').textContent =
                    `最后更新: ${now.toLocaleTimeString()}`;
            }

            renderEvents() {
                const container = document.getElementById('eventsContainer');
                const maxDisplay = 50; // 只显示最近50个事件
                const displayEvents = this.events.slice(0, maxDisplay);

                if (displayEvents.length === 0) {
                    container.innerHTML = `
                        <div style="text-align: center; opacity: 0.5; margin: 50px 0;">
                            📡 等待实时事件推送...
                        </div>
                    `;
                    return;
                }

                container.innerHTML = displayEvents.map(event => `
                    <div class="event event-${event.type}">
                        <div class="event-header">
                            <span class="event-type">${this.getEventIcon(event.type)} ${event.type}</span>
                            <span class="event-time">${new Date(event.timestamp).toLocaleTimeString()}</span>
                        </div>
                        <div class="event-message">${event.message}</div>
                        <div class="event-command">Agent: ${event.agent} | Command: ${event.command}</div>
                    </div>
                `).join('');
            }

            getEventIcon(type) {
                const icons = {
                    'blocked': '🛡️',
                    'warning': '⚠️',
                    'allowed': '✅',
                    'info': 'ℹ️'
                };
                return icons[type] || '📝';
            }

            startUptime() {
                setInterval(() => {
                    const uptime = Math.floor((Date.now() - this.startTime) / 1000);
                    const minutes = Math.floor(uptime / 60);
                    const seconds = uptime % 60;
                    document.getElementById('uptimeDisplay').textContent =
                        `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }, 1000);
            }
        }

        // 启动监控
        const monitor = new AegisWebSocketMonitor();

        // 页面标题闪烁提醒
        let originalTitle = document.title;
        function blinkTitle(message) {
            document.title = `🚨 ${message}`;
            setTimeout(() => {
                document.title = originalTitle;
            }, 3000);
        }

        // 监听新的拦截事件
        window.addEventListener('beforeunload', () => {
            if (monitor.ws) {
                monitor.ws.close();
            }
        });
    </script>
</body>
</html>
