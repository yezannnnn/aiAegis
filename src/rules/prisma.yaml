# Aegis Prisma 规则集
# 防止 AI Agent 执行破坏性数据库迁移

name: aegis/prisma
version: "1.0.0"
description: "Prisma ORM protection rules"

rules:
  # BLOCK — 绝对禁止
  - pattern: "\\bnpx\\s+prisma\\s+migrate\\s+reset\\b|\\bnpx\\s+prisma\\s+migrate\\s+dev\\s+--force\\b|\\bnpx\\s+prisma\\s+db\\s+push\\s+--force-reset\\b"
    description: "Prisma destructive migration"
    severity: block
    category: "prisma"

  - pattern: "\\bnpx\\s+prisma\\s+db\\s+seed.*\\b--force\\b"
    description: "Prisma force seed"
    severity: block
    category: "prisma"

  # ERROR — 需要审批
  - pattern: "\\bnpx\\s+prisma\\s+migrate\\s+(dev|deploy)\\b"
    description: "Prisma migration"
    severity: error
    category: "prisma"

  - pattern: "\\bnpx\\s+prisma\\s+db\\s+push\\b"
    description: "Prisma db push"
    severity: error
    category: "prisma"

  - pattern: "\\bnpx\\s+prisma\\s+migrate\\s+resolve\\b"
    description: "Prisma migrate resolve"
    severity: error
    category: "prisma"

  - pattern: "\\bnpx\\s+prisma\\s+db\\s+execute\\b"
    description: "Prisma db execute"
    severity: error
    category: "prisma"

  # WARN — 记录放行
  - pattern: "\\bnpx\\s+prisma\\s+generate\\b"
    description: "Prisma generate"
    severity: warn
    category: "prisma"

  - pattern: "\\bnpx\\s+prisma\\s+format\\b|\\bnpx\\s+prisma\\s+validate\\b"
    description: "Prisma format/validate"
    severity: warn
    category: "prisma"

  - pattern: "\\bnpx\\s+prisma\\s+studio\\b"
    description: "Prisma studio"
    severity: warn
    category: "prisma"

  - pattern: "\\bnpx\\s+prisma\\s+migrate\\s+status\\b"
    description: "Prisma migrate status"
    severity: warn
    category: "prisma"
