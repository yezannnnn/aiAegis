# Aegis Git 规则集
# 防止 AI Agent 执行破坏性版本控制操作

name: aegis/git
version: "1.0.0"
description: "Git protection rules"

rules:
  # BLOCK — 绝对禁止
  - pattern: "\\bgit\\s+push\\s+.*\\b--force\\b|\\bgit\\s+push\\s+.*\\b-f\\b"
    description: "git force push"
    severity: block
    category: "git"

  - pattern: "\\bgit\\s+filter-branch\\b|\\bgit\\s+filter-repo\\b"
    description: "git history rewrite"
    severity: block
    category: "git"

  - pattern: "\\bgit\\s+remote\\s+set-url\\b.*\\bhttp"
    description: "git remote change to http"
    severity: block
    category: "git"

  # ERROR — 需要审批
  - pattern: "\\bgit\\s+clean\\s+.*\\b-f\\b|\\bgit\\s+clean\\s+.*\\b-x\\b"
    description: "git clean force"
    severity: error
    category: "git"

  - pattern: "\\bgit\\s+checkout\\s+.*\\b--\\s+\\.\\b|\\bgit\\s+checkout\\s+.*\\b--\\s+\\*\\b"
    description: "git checkout overwrite"
    severity: error
    category: "git"

  - pattern: "\\bgit\\s+revert\\s+.*\\b--no-edit\\b|\\bgit\\s+revert\\s+.*\\b-n\\b"
    description: "git revert no-edit"
    severity: error
    category: "git"

  - pattern: "\\bgit\\s+branch\\s+-D\\b|\\bgit\\s+branch\\s+--delete\\s+--force\\b"
    description: "git force delete branch"
    severity: error
    category: "git"

  - pattern: "\\bgit\\s+reset\\s+.*\\b--hard\\b"
    description: "git reset hard"
    severity: error
    category: "git"

  - pattern: "\\bgit\\s+rebase\\s+.*\\b-i\\b|\\bgit\\s+rebase\\s+.*\\b--interactive\\b"
    description: "git interactive rebase"
    severity: error
    category: "git"

  - pattern: "\\bgit\\s+cherry-pick\\s+.*\\b--no-commit\\b"
    description: "git cherry-pick no-commit"
    severity: error
    category: "git"

  # WARN — 记录放行
  - pattern: "\\bgit\\s+add\\b|\\bgit\\s+commit\\b|\\bgit\\s+status\\b|\\bgit\\s+log\\b|\\bgit\\s+diff\\b"
    description: "git normal operation"
    severity: warn
    category: "git"

  - pattern: "\\bgit\\s+pull\\b|\\bgit\\s+fetch\\b"
    description: "git sync"
    severity: warn
    category: "git"

  - pattern: "\\bgit\\s+merge\\b"
    description: "git merge"
    severity: warn
    category: "git"

  - pattern: "\\bgit\\s+branch\\b|\\bgit\\s+checkout\\b"
    description: "git branch/checkout"
    severity: warn
    category: "git"
