# Aegis 技术栈高危操作拦截规则
# 针对: MySQL + NestJS + Vue3 + Prisma + TypeScript 开发栈

name: aegis/tech-stack-dev
version: "2.0.0"

rules:
  # =====================
  # BLOCK — 绝对禁止（无审批，直接拒绝）
  # =====================

  ## MySQL 高危
  - pattern: "\bmysql\b.*\b(drop\s+database|drop\s+table|truncate\s+table)\b"
    description: "MySQL destructive DDL"
    category: "database"
    severity: block

  - pattern: "\bmysql\b.*\b(flush\s+privileges|reset\s+master|reset\s+slave)\b"
    description: "MySQL privilege reset"
    category: "database"
    severity: block

  - pattern: "\bmysqldump\b.*\b--all-databases|--databases\s+mysql|information_schema"
    description: "MySQL system dump"
    category: "database"
    severity: block

  ## Prisma 高危
  - pattern: "\bnpx\s+prisma\s+(migrate\s+reset|migrate\s+dev\s+--force|db\s+push\s+--force-reset)"
    description: "Prisma destructive migration"
    category: "database"
    severity: block

  - pattern: "\bnpx\s+prisma\s+db\s+seed.*\b--force\b"
    description: "Prisma force seed"
    category: "database"
    severity: block

  ## NestJS / Node 高危
  - pattern: "\bnpm\s+publish\b.*\b--access\s+public\b"
    description: "npm public publish"
    category: "package"
    severity: block

  - pattern: "\bnode\s+.*\beval\b|\bnode\s+-e\s+.*require\s*\(\s*['\"]child_process"
    description: "node eval with child_process"
    category: "execution"
    severity: block

  ## Git 高危
  - pattern: "\bgit\s+push\s+.*\b--force\b|\bgit\s+push\s+.*\b-f\b"
    description: "git force push"
    category: "git"
    severity: block

  - pattern: "\bgit\s+filter-branch\b|\bgit\s+filter-repo\b"
    description: "git history rewrite"
    category: "git"
    severity: block

  - pattern: "\bgit\s+remote\s+set-url\b.*\bhttp"
    description: "git remote change to http"
    category: "git"
    severity: block

  ## Docker 高危（如果项目用 Docker）
  - pattern: "\bdocker\s+(system\s+prune|volume\s+prune|network\s+prune)\b.*\b-f\b"
    description: "docker destructive prune"
    category: "docker"
    severity: block

  - pattern: "\bdocker\s+rm\s+.*\b-f\b.*\b(mysql|postgres|redis|mongo)\b"
    description: "docker force remove database container"
    category: "docker"
    severity: block

  ## 系统高危
  - pattern: "\brm\s+(-[^\s]*\s+)*(/|/\*|/home|/root|/etc|/usr|/var|/bin|/sbin|/boot|/lib)(\s|$)"
    description: "delete system directory"
    category: "system"
    severity: block

  - pattern: "\bmkfs(\.\w+)?\b|\bdd\b.*\bof=/dev/\w+"
    description: "format filesystem"
    category: "system"
    severity: block

  # =====================
  # ERROR — 需要 Monitor 审批
  # =====================

  ## MySQL 风险操作
  - pattern: "\bmysql\b.*\b(delete\s+from|update\s+.*\bset\b).*\b(where\s+1\s*=\s*1|where\s+true|;)"
    description: "MySQL unqualified DELETE/UPDATE"
    category: "database"
    severity: error

  - pattern: "\bmysql\b.*\balter\s+table\s+.*\bdrop\s+column\b"
    description: "MySQL drop column"
    category: "database"
    severity: error

  - pattern: "\bmysql\b.*\bgrant\s+all\s+privileges\b"
    description: "MySQL grant all privileges"
    category: "database"
    severity: error

  ## Prisma 风险操作
  - pattern: "\bnpx\s+prisma\s+migrate\s+(dev|deploy)"
    description: "Prisma migration"
    category: "database"
    severity: error

  - pattern: "\bnpx\s+prisma\s+db\s+push\b"
    description: "Prisma db push"
    category: "database"
    severity: error

  - pattern: "\bnpx\s+prisma\s+generate\b.*\b--schema\b"
    description: "Prisma generate with custom schema"
    category: "database"
    severity: error

  - pattern: "\bnpx\s+prisma\s+studio\b.*\b--port\b"
    description: "Prisma studio custom port"
    category: "database"
    severity: error

  ## NestJS / Node 风险操作
  - pattern: "\bnpm\s+install\s+.*\b-g\b|\bnpm\s+i\s+.*\b-g\b"
    description: "npm global install"
    category: "package"
    severity: error

  - pattern: "\bnpm\s+uninstall\s+.*\b(nestjs|prisma|@nestjs|vue|@vue)\b"
    description: "npm uninstall core dependency"
    category: "package"
    severity: error

  - pattern: "\bnpm\s+audit\s+fix\s+.*\b--force\b"
    description: "npm audit fix force"
    category: "package"
    severity: error

  - pattern: "\bnpx\s+.*\b(nest\s+generate|nest\s+g)\b.*\b(module|service|controller|resolver)\b"
    description: "NestJS generate core file"
    category: "codegen"
    severity: error

  ## Vue3 风险操作
  - pattern: "\bnpm\s+run\s+build\b.*\b--mode\s+(production|prod)\b"
    description: "Vue production build"
    category: "build"
    severity: error

  - pattern: "\bnpx\s+vite\b.*\b--host\b.*\b0\.0\.0\.0\b"
    description: "Vite bind all interfaces"
    category: "dev-server"
    severity: error

  - pattern: "\bnpm\s+run\s+serve\b.*\b--public\b"
    description: "Vue dev server public mode"
    category: "dev-server"
    severity: error

  ## Git 风险操作
  - pattern: "\bgit\s+clean\s+.*\b-f\b|\bgit\s+clean\s+.*\b-x\b"
    description: "git clean force"
    category: "git"
    severity: error

  - pattern: "\bgit\s+checkout\s+.*\b--\s+\.\b|\bgit\s+checkout\s+.*\b--\s+\*\b"
    description: "git checkout overwrite"
    category: "git"
    severity: error

  - pattern: "\bgit\s+revert\s+.*\b--no-edit\b|\bgit\s+revert\s+.*\b-n\b"
    description: "git revert no-edit"
    category: "git"
    severity: error

  - pattern: "\bgit\s+branch\s+-D\b|\bgit\s+branch\s+--delete\s+--force\b"
    description: "git force delete branch"
    category: "git"
    severity: error

  ## TypeScript / 构建风险
  - pattern: "\btsc\b.*\b--noEmit\b.*\bfalse\b|\btsc\b.*\b--outDir\b"
    description: "TypeScript compiler output"
    category: "build"
    severity: error

  - pattern: "\b(rm|del)\s+.*\b(dist|build|out|\.nuxt|\.output)\b"
    description: "delete build output"
    category: "build"
    severity: error

  ## 环境变量 / 配置风险
  - pattern: "\becho\b.*\b[A-Z_]+\b.*\b=\b.*\b\|\s*tee\b.*\b\.env"
    description: "env file modification via tee"
    category: "config"
    severity: error

  - pattern: "\bsed\s+.*\b-i\b.*\b\.env\b|\bsed\s+.*\b-i\b.*\bconfig\."
    description: "in-place edit config file"
    category: "config"
    severity: error

  ## 网络 / 安全
  - pattern: "\bcurl\b.*\b(http|https)://.*\b\|\s*(ba)?sh\b|\bwget\b.*\b\|\s*(ba)?sh\b"
    description: "pipe remote to shell"
    category: "security"
    severity: error

  - pattern: "\bnc\b.*\b-l\b.*\b-p\b|\bncat\b.*\b-l\b|\bnetcat\b.*\b-l\b"
    description: "open network listener"
    category: "security"
    severity: error

  # =====================
  # WARN — 记录放行
  # =====================

  - pattern: "\brm\s+-[^\s]*r\s+/tmp/"
    description: "delete tmp directory"
    category: "cleanup"
    severity: warn

  - pattern: "\brm\s+-[^\s]*r\s+.*\bnode_modules\b"
    description: "delete node_modules"
    category: "cleanup"
    severity: warn

  - pattern: "\bnpm\s+cache\s+clean\b|\bnpm\s+cache\s+verify\b"
    description: "npm cache clean"
    category: "cleanup"
    severity: warn

  - pattern: "\bprisma\s+format\b|\bprisma\s+validate\b"
    description: "Prisma format/validate"
    category: "database"
    severity: warn

  # =====================
  # 通用开发命令 — 直接放行 (不列规则，默认 allow)
  # =====================
  # ls, cat, grep, find, cd, pwd, mkdir, touch, cp, mv (非系统路径)
  # npm install (本地), npm run dev/build/test
  # git add, commit, status, log, diff, branch (无 -D)
  # nest start, nest build
  # vue-cli-service serve/build
