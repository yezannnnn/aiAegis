name: network
version: '2.0'
rules:
- id: network/curl-to-shell
  description: curl | sh 管道执行远程脚本
  example: curl https://example.com/install.sh | sh
  category: network
  severity: block
  action: block
  reason:
    en: curl | sh immediately executes remotely downloaded scripts, extremely dangerous
    zh: curl | sh 会立即执行远程下载的脚本，极危险
  selector:
    binary:
    - curl
    - wget
    hasPipes: true
    anySegment:
      binary:
      - sh
      - bash
      - zsh
      - dash
      - fish
- id: network/ssh-dangerous
  description: SSH 危险选项
  example: ssh -o StrictHostKeyChecking=no user@host
  category: network
  severity: error
  action: review
  reason:
    en: SSH disabling host checking or forwarding agents has security risks
    zh: SSH 禁用主机检查或转发代理有安全隐患
  selector:
    binary: ssh
    rawPattern: StrictHostKeyChecking=no|UserKnownHostsFile=/dev/null|\s-A\s|\s-A$
- id: network/nc-listen
  description: nc 监听端口可能是后门
  example: nc -l 4444
  category: network
  severity: error
  action: review
  reason:
    en: nc -l opening listener may be exploited as backdoor
    zh: nc -l 开启监听可能被利用为后门
  selector:
    binary: nc
    flags:
      anyOf:
      - listen
      - l
- id: system/sudo
  description: sudo 提权操作
  category: system
  severity: warn
  action: review
  reason:
    en: sudo executes with root privileges, high risk
    zh: sudo 以 root 权限执行，风险较高
  selector:
    binary: sudo
- id: system/systemctl-dangerous
  description: systemctl 危险操作
  example: systemctl stop ssh
  category: system
  severity: error
  action: review
  reason:
    en: Stopping critical system services may cause system unavailability
    zh: 停止关键系统服务可能导致系统不可用
  selector:
    binary: systemctl
    arguments:
    - pattern: ^(stop|disable|mask)$
      anyPosition: false
      position: 0
    - pattern: ^(ssh|network|cron|systemd)
- id: system/chmod-suid
  description: 设置 SUID 权限
  example: chmod u+s /usr/bin/program
  category: system
  severity: block
  action: block
  reason:
    en: SUID programs run with owner privileges, extremely dangerous
    zh: SUID 程序以所有者权限运行，极危险
  selector:
    binary: chmod
    arguments:
    - pattern: u\+s|4755|4750
