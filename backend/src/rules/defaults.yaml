name: defaults
version: '2.0'
rules:
- id: system/shutdown
  description: 系统关机 / 重启命令
  category: system
  severity: block
  action: block
  reason:
    en: Shutdown/reboot will immediately interrupt all services
    zh: 关机/重启会立即中断所有服务
  selector:
    binary:
    - shutdown
    - reboot
    - halt
    - poweroff
- id: system/systemctl-poweroff
  description: systemctl poweroff / reboot / halt
  category: system
  severity: block
  action: block
  reason:
    en: Triggering system shutdown via systemctl
    zh: 通过 systemctl 触发系统关机
  selector:
    binary: systemctl
    arguments:
    - pattern: ^(poweroff|reboot|halt|kexec)$
- id: package/npm-unpublish
  description: npm unpublish 撤销已发布的包
  category: package
  severity: error
  action: review
  reason:
    en: npm unpublish will break all users depending on this package
    zh: unpublish 会破坏依赖此包的所有用户
  selector:
    binary: npm
    subcommands:
    - unpublish
