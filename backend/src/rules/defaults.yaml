name: "defaults"
version: "1.0"

rules:

  - id: system/shutdown
    description: "系统关机 / 重启命令"
    category: "system"
    severity: "block"
    action: "block"
    reason: "关机/重启会立即中断所有服务"
    conditions:
      binary: ["shutdown", "reboot", "halt", "poweroff"]

  - id: system/systemctl-poweroff
    description: "systemctl poweroff / reboot / halt"
    category: "system"
    severity: "block"
    action: "block"
    reason: "通过 systemctl 触发系统关机"
    conditions:
      binary: "systemctl"
      argumentPatterns:
        - '^(poweroff|reboot|halt|kexec)$'

  - id: package/npm-unpublish
    description: "npm unpublish 撤销已发布的包"
    category: "package"
    severity: "error"
    action: "review"
    reason: "unpublish 会破坏依赖此包的所有用户"
    conditions:
      binary: "npm"
      subcommand: "unpublish"

