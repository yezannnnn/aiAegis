name: "git"
version: "2.0"
rules:
  - id: git/force-push/main
    description: "禁止在 main/master 分支强制推送"
    category: "git"
    severity: "block"
    action: "block"
    reason: "在 main/master 分支强制推送会覆盖他人提交，极危险"
    selector:
      binary: git
      subcommands: [push]
      flags:
        anyOf: [force, f]
      contextChecks:
        gitBranch: [main, master]

  - id: git/force-push/other
    description: "非 main 分支强制推送需审查"
    category: "git"
    severity: "error"
    action: "review"
    reason: "强制推送会改写历史，需人工确认"
    selector:
      binary: git
      subcommands: [push]
      flags:
        anyOf: [force, f]

  - id: git/force-with-lease
    description: "git push --force-with-lease 需审查"
    category: "git"
    severity: "error"
    action: "review"
    reason: "force-with-lease 会改写远端历史，需人工确认"
    selector:
      binary: git
      subcommands: [push]
      flags:
        anyOf: [force-with-lease]

  - id: git/reset-hard
    description: "git reset --hard 会丢失未提交更改"
    category: "git"
    severity: "error"
    action: "review"
    reason: "hard reset 会永久删除未提交的更改"
    selector:
      binary: git
      subcommands: [reset]
      flags:
        anyOf: [hard]

  - id: git/clean-force
    description: "git clean -f 会永久删除未跟踪文件"
    category: "git"
    severity: "error"
    action: "review"
    reason: "clean -f 会删除文件，无法恢复"
    selector:
      binary: git
      subcommands: [clean]
      flags:
        anyOf: [force, f]

  - id: git/rebase-main
    description: "在 main 分支执行 rebase 危险"
    category: "git"
    severity: "error"
    action: "review"
    reason: "在 main 分支 rebase 会改写公共历史"
    selector:
      binary: git
      subcommands: [rebase]
      contextChecks:
        gitBranch: [main, master]
