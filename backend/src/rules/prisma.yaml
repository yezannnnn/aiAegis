name: prisma
version: '2.0'
rules:
- id: prisma/migrate-reset
  description: prisma migrate reset 重置数据库
  category: prisma
  severity: block
  action: block
  reason:
    en: migrate reset deletes all data and reapplies migrations, cannot be recovered
    zh: migrate reset 删除所有数据并重新应用迁移，不可恢复
  selector:
    binary: npx
    subcommands:
    - prisma
    - migrate
    - reset
- id: prisma/migrate-force
  description: prisma migrate dev/deploy --force
  category: prisma
  severity: block
  action: block
  reason:
    en: --force skips safety checks, may cause data loss
    zh: --force 跳过安全检查，可能导致数据丢失
  selector:
    binary: npx
    subcommands:
    - prisma
    - migrate
    flags:
      anyOf:
      - force
- id: prisma/db-push-force-reset
  description: prisma db push --force-reset
  category: prisma
  severity: block
  action: block
  reason:
    en: --force-reset deletes all data and rebuilds schema
    zh: --force-reset 删除所有数据并重建 schema
  selector:
    binary: npx
    subcommands:
    - prisma
    - db
    - push
    flags:
      anyOf:
      - force-reset
- id: prisma/db-seed-force
  description: prisma db seed --force
  category: prisma
  severity: block
  action: block
  reason:
    en: Forced seed may overwrite production data
    zh: 强制 seed 可能覆盖生产数据
  selector:
    binary: npx
    subcommands:
    - prisma
    - db
    - seed
    flags:
      anyOf:
      - force
- id: prisma/migrate-apply
  description: prisma migrate dev / deploy
  category: prisma
  severity: error
  action: review
  reason:
    en: Database migration modifies production schema, requires manual confirmation
    zh: 数据库迁移会修改生产 schema，需人工确认
  selector:
    binary: npx
    subcommands:
    - prisma
    - migrate
    arguments:
    - pattern: ^(dev|deploy)$
      position: 2
- id: prisma/db-push
  description: prisma db push 同步 schema
  category: prisma
  severity: error
  action: review
  reason:
    en: db push directly modifies database structure without migration history
    zh: db push 直接修改数据库结构，不产生迁移历史
  selector:
    binary: npx
    subcommands:
    - prisma
    - db
    - push
- id: prisma/migrate-resolve
  description: prisma migrate resolve
  category: prisma
  severity: error
  action: review
  reason:
    en: Manually resolving migration conflicts requires careful operation
    zh: 手动解决迁移冲突需要谨慎操作
  selector:
    binary: npx
    subcommands:
    - prisma
    - migrate
    - resolve
- id: prisma/db-execute
  description: prisma db execute 直接执行 SQL
  category: prisma
  severity: error
  action: review
  reason:
    en: Directly executing arbitrary SQL carries high risk
    zh: 直接执行任意 SQL 风险较高
  selector:
    binary: npx
    subcommands:
    - prisma
    - db
    - execute
