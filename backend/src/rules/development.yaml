name: "development"
version: "1.0"
rules:
  - id: npm/uninstall-production
    description: "生产环境卸载依赖"
    category: "package"
    severity: "error"
    action: "review"
    reason: "生产环境卸载依赖可能导致服务中断"
    conditions:
      binary: "npm"
      subcommand: "uninstall"
      contextChecks:
        isProduction: true

  - id: npm/audit-fix-force
    description: "npm audit fix --force 强制修复"
    category: "package"
    severity: "error"
    action: "review"
    reason: "audit fix --force 可能引入破坏性变更"
    conditions:
      binary: "npm"
      subcommand: "audit"
      hasFlags: ["force", "f"]

  - id: python/pip-install-url
    description: "pip 从 URL 安装"
    category: "package"
    severity: "error"
    action: "review"
    reason: "从 URL 安装包无法验证来源安全性"
    conditions:
      binary: "pip"
      subcommand: "install"
      argumentPatterns: ["http", "https"]
