name: sqlite
version: '2.0'
rules:
- id: sqlite/drop-schema
  description: SQLite DROP TABLE / DROP INDEX / DROP VIEW
  example: sqlite3 app.db "DROP TABLE users"
  category: sqlite
  severity: block
  action: block
  reason:
    en: DROP permanently deletes table structure and data, cannot be recovered
    zh: DROP 操作永久删除表结构和数据，不可恢复
  selector:
    binary: sqlite3
    arguments:
    - pattern: drop\s+(table|index|view|trigger)
- id: sqlite/delete-file
  description: 直接删除 SQLite 数据库文件
  example: rm app.db
  category: sqlite
  severity: block
  action: block
  reason:
    en: Deleting .db/.sqlite files is equivalent to deleting database, all data lost
    zh: 删除 .db/.sqlite 文件等同于删库，数据全部丢失
  selector:
    binary: rm
    arguments:
    - pattern: \.(db|sqlite|sqlite3)$
- id: sqlite/unqualified-delete
  description: SQLite 无条件 DELETE（清空整表）
  example: sqlite3 app.db "DELETE FROM users"
  category: sqlite
  severity: error
  action: review
  reason:
    en: DELETE without WHERE condition empties entire table
    zh: 无 WHERE 条件的 DELETE 会清空整张表
  selector:
    binary: sqlite3
    arguments:
    - pattern: delete\s+from\s+\w+\s*;?\s*$
- id: sqlite/drop-column
  description: SQLite ALTER TABLE DROP COLUMN
  example: sqlite3 app.db "ALTER TABLE t DROP COLUMN col"
  category: sqlite
  severity: error
  action: review
  reason:
    en: Dropping columns is irreversible, column data permanently lost
    zh: 删除列操作不可逆，该列数据永久丢失
  selector:
    binary: sqlite3
    arguments:
    - pattern: alter\s+table.*drop\s+column
- id: sqlite/dump
  description: sqlite3 .dump 导出完整数据库
  example: sqlite3 app.db .dump
  category: sqlite
  severity: error
  action: review
  reason:
    en: .dump exports all data, may leak sensitive information
    zh: .dump 导出所有数据，可能泄露敏感信息
  selector:
    binary: sqlite3
    arguments:
    - pattern: \.dump
- id: sqlite/read-sql-file
  description: sqlite3 .read 执行外部 SQL 文件
  example: sqlite3 app.db ".read migration.sql"
  category: sqlite
  severity: error
  action: review
  reason:
    en: .read executes arbitrary SQL files, content is uncontrollable
    zh: .read 会执行任意 SQL 文件，内容不可控
  selector:
    binary: sqlite3
    arguments:
    - pattern: \.read\s+
- id: sqlite/copy-db-file
  description: 复制或移动 SQLite 数据库文件
  example: cp app.db /tmp/app_backup.db
  category: sqlite
  severity: error
  action: review
  reason:
    en: Copying database files may lead to sensitive data leakage
    zh: 复制数据库文件可能导致敏感数据外泄
  selector:
    binary: cp
    arguments:
    - pattern: \.(db|sqlite|sqlite3)
- id: sqlite/pragma-security
  description: SQLite PRAGMA 修改安全相关配置
  example: sqlite3 app.db "PRAGMA journal_mode=OFF"
  category: sqlite
  severity: warn
  action: review
  reason:
    en: Modifying journal_mode/synchronous may affect data integrity
    zh: 修改 journal_mode/synchronous 可能影响数据完整性
  selector:
    binary: sqlite3
    arguments:
    - pattern: pragma\s+(journal_mode|synchronous|wal_checkpoint|foreign_keys)\s*=
