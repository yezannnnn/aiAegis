name: docker
version: '2.0'
rules:
- id: docker/rm-force
  description: docker rm -f 强制删除运行中的容器
  example: docker rm -f my_container
  category: docker
  severity: error
  action: review
  reason:
    en: Force-deleting running containers may cause data loss
    zh: 强制删除运行中的容器可能导致数据丢失
  selector:
    binary: docker
    subcommands:
    - rm
    flags:
      anyOf:
      - force
      - f
- id: docker/system-prune
  description: docker system prune 会删除大量资源
  example: docker system prune -a
  category: docker
  severity: error
  action: review
  reason:
    en: system prune deletes unused containers, networks, images and volumes
    zh: system prune 会删除未使用的容器、网络、镜像和卷
  selector:
    binary: docker
    subcommands:
    - system
    - prune
- id: docker/volume-rm
  description: 删除 Docker 卷可能丢失持久化数据
  example: docker volume rm my_data_volume
  category: docker
  severity: error
  action: review
  reason:
    en: Docker volumes usually contain persistent data such as databases
    zh: Docker 卷通常包含数据库等持久化数据
  selector:
    binary: docker
    subcommands:
    - volume
    - rm
- id: docker/run-privileged
  description: docker run --privileged 授予完全主机权限
  category: docker
  severity: block
  action: block
  reason:
    en: --privileged containers can access all host devices, extremely dangerous
    zh: --privileged 容器可以访问所有主机设备，极危险
  selector:
    binary: docker
    subcommands:
    - run
    flags:
      anyOf:
      - privileged
- id: docker/exec-root
  description: 以 root 身份进入容器
  example: docker exec -u root my_container bash
  category: docker
  severity: warn
  action: review
  reason:
    en: Entering container as root may break internal permission settings
    zh: 以 root 进入容器可能破坏容器内权限设置
  selector:
    binary: docker
    subcommands:
    - exec
    flags:
      anyOf:
      - user
      - u
    arguments:
    - pattern: ^root$
